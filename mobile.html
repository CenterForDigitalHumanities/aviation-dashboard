<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KCPS Status">
    <title>KCPS Flight Status</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <style>
        /* ── Reset + safe-area variables ─────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --header-h: 52px;
            --nav-h: 58px;
            --safe-top:    env(safe-area-inset-top,    0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --blue: #0056b3;
            --surface: #fff;
            --bg: #f0f2f5;
            --text: #1a1a1a;
            --muted: #666;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── App header ──────────────────────────────────────────────── */
        .app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: calc(var(--header-h) + var(--safe-top));
            padding-top: var(--safe-top);
            background: #1a1a2e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 16px;
            padding-right: 12px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header-left h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1.2;
        }
        .header-left .update-time {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 1px;
        }
        .notify-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .notify-btn:active { background: rgba(255,255,255,0.22); }
        .notify-btn.on  { background: rgba(84,208,84,0.25); border-color: #4caf50; }
        .notify-btn.off { opacity: 0.45; cursor: not-allowed; }

        .toast {
            position: fixed;
            left: 50%;
            bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px);
            transform: translateX(-50%) translateY(10px);
            z-index: 250;
            background: rgba(32,32,40,0.96);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Main scroll container ───────────────────────────────────── */
        .main-scroll {
            position: fixed;
            top: calc(var(--header-h) + var(--safe-top));
            bottom: calc(var(--nav-h) + var(--safe-bottom));
            left: 0; right: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ── Sticky top section (category card + temp note) ─────────── */
        .sticky-top {
            background: var(--bg);
            padding: 14px 14px 0;
        }

        /* ── Category card ───────────────────────────────────────────── */
        .flight-status-card {
            border: 3px solid #ddd;
            border-radius: 14px;
            padding: 22px 16px 18px;
            text-align: center;
            background: #f8f9fa;
            transition: border-color 0.4s, background 0.4s;
        }
        .flight-status-card.cat-a { border-color: #548235; background: linear-gradient(150deg, rgba(84,130,53,0.15), rgba(84,130,53,0.06)); }
        .flight-status-card.cat-b { border-color: #cccc00; background: linear-gradient(150deg, rgba(255,255,0,0.30), rgba(255,255,0,0.12)); }
        .flight-status-card.cat-c { border-color: #ed7d31; background: linear-gradient(150deg, rgba(237,125,49,0.20), rgba(237,125,49,0.08)); }
        .flight-status-card.cat-d { border-color: #ff0000; background: linear-gradient(150deg, rgba(255,0,0,0.18), rgba(255,0,0,0.06)); }
        .flight-status-card.cat-f { border-color: #000; background: linear-gradient(150deg, #2a2a2a, #1a1a1a); }

        .status-title {
            font-size: 5rem;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        .flight-status-card.cat-a .status-title { color: #548235; }
        .flight-status-card.cat-b .status-title { color: #5a5a00; }
        .flight-status-card.cat-c .status-title { color: #ed7d31; }
        .flight-status-card.cat-d .status-title { color: #ff0000; }
        .flight-status-card.cat-f .status-title { color: #fff; }

        .status-details {
            font-size: 0.88rem;
            line-height: 1.45;
            margin-top: 8px;
            color: #333;
        }
        .flight-status-card.cat-f .status-details { color: #ccc; }

        .station-line {
            font-size: 0.72rem;
            margin-top: 6px;
            opacity: 0.6;
            color: inherit;
        }
        .flight-status-card.cat-f .station-line { color: #aaa; opacity: 1; }

        .fallback-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.7em;
            border-radius: 999px;
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            vertical-align: middle;
        }

        /* ── Temp/heat note ──────────────────────────────────────────── */
        .temp-note {
            margin: 10px 0 14px;
            padding: 10px 13px;
            border-radius: 9px;
            font-size: 0.82rem;
            line-height: 1.45;
            border-left: 4px solid #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .temp-note.warn  { border-color: #ffa000; background: #fff8e1; color: #e65100; }
        .temp-note.alert { border-color: #f44336; background: #ffebee; color: #b71c1c; }

        /* ── Panel content ───────────────────────────────────────────── */
        .panel { display: none; padding: 14px; }
        .panel.active { display: block; }

        .section-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            margin-bottom: 8px;
            margin-top: 4px;
        }

        /* Announcements */
        .closed-banner {
            display: none;
            background: #1a1a1a;
            color: #fff;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            text-align: center;
            border: 2px solid #000;
        }
        .closed-banner.active { display: block; }
        .closed-banner .icon { font-size: 2rem; line-height: 1; }
        .closed-banner h3 { margin: 6px 0 3px; font-size: 1rem; }
        .closed-banner p  { font-size: 0.82rem; opacity: 0.75; }

        .announcement-item {
            background: var(--surface);
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 9px;
        }
        .announcement-date    { font-size: 0.72rem; color: #888; margin-bottom: 2px; }
        .announcement-title   { font-weight: 600; font-size: 0.92rem; margin-bottom: 4px; }
        .announcement-content { font-size: 0.83rem; color: #555; line-height: 1.45; }

        /* METAR / Conditions */
        .metar-box {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 9px;
            padding: 11px 13px;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            word-break: break-all;
            line-height: 1.55;
            margin-bottom: 12px;
        }

        .conditions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .cond-item {
            background: var(--surface);
            border: 1px solid #e4e4e4;
            border-radius: 9px;
            padding: 10px 12px;
        }
        .cond-label {
            font-size: 0.66rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .cond-value { font-size: 1rem; font-weight: 600; color: var(--text); }
        .cond-value.ok    { color: #2e7d32; }
        .cond-value.warn  { color: #e65100; }
        .cond-value.alert { color: #c62828; }

        /* Restrictions */
        .restriction-group {
            background: var(--surface);
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 11px;
        }
        .restriction-group-header {
            background: #f5f5f5;
            padding: 9px 14px;
            font-weight: 700;
            font-size: 0.86rem;
            border-bottom: 1px solid #e8e8e8;
        }
        .restriction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            border-top: 1px solid #f2f2f2;
            font-size: 0.82rem;
            gap: 8px;
        }
        .restriction-row .rlabel { flex: 1; color: #444; }
        .status-pill {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-pill.ok         { background: #e8f5e9; color: #2e7d32; }
        .status-pill.restricted { background: #ffebee; color: #c62828; }

        /* ── Bottom nav ──────────────────────────────────────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--surface);
            border-top: 1px solid #ddd;
            display: flex;
            z-index: 100;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 0;
            color: #999;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.15s;
        }
        .nav-btn svg { width: 23px; height: 23px; flex-shrink: 0; stroke: currentColor; }
        .nav-btn.active { color: var(--blue); }
    </style>
</head>
<body>
    <!-- ── Fixed header ───────────────────────────────────────────────── -->
    <header class="app-header">
        <div class="header-left">
            <h1>SLU Aviation · KCPS</h1>
            <div class="update-time" id="updateTime">Connecting…</div>
        </div>
        <button class="notify-btn" id="notifyBtn" onclick="handleNotifyBtn()">🔔 Notify</button>
    </header>

    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- ── Main scroll area ──────────────────────────────────────────── -->
    <main class="main-scroll">

        <!-- ── Announcements panel (default) ─────────────────────────── -->
        <div id="panel-announcements" class="panel active">
            <!-- Category card + temp note — visible only on Announcements tab -->
            <div class="sticky-top">
                <div id="catCard" class="flight-status-card cat-a">
                    <div id="catLetter" class="status-title">–</div>
                    <div id="catDetails" class="status-details">Loading weather data…</div>
                    <div id="catStation" class="station-line"></div>
                </div>
                <div id="tempNote" class="temp-note" style="display:none;"></div>
            </div>
            <div class="closed-banner" id="closedBanner">
                <div class="icon">🚫</div>
                <h3>Airport Closed</h3>
                <p>All flights are grounded. See announcements below.</p>
            </div>
            <div class="section-label">Airport Announcements</div>
            <div id="announcementsContent">
                <p style="color:#aaa; font-size:0.85rem; padding:8px 0;">Loading announcements…</p>
            </div>
        </div>

        <!-- ── METAR + Conditions panel ──────────────────────────────── -->
        <div id="panel-metar" class="panel">
            <div class="section-label">KCPS METAR</div>
            <div id="metarKcps" class="metar-box">Loading…</div>
            <div class="section-label">KSTL METAR</div>
            <div id="metarKstl" class="metar-box">Loading…</div>
            <div class="section-label" style="margin-top:6px;">Current Conditions</div>
            <div id="conditionsGrid" class="conditions-grid"></div>
        </div>

        <!-- ── Restrictions panel ────────────────────────────────────── -->
        <div id="panel-restrictions" class="panel">
            <!-- Filled dynamically by renderRestrictionsPanel() -->
        </div>

    </main>

    <!-- ── Fixed bottom nav ──────────────────────────────────────────── -->
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-announcements" onclick="switchPanel('announcements')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            Announce
        </button>
        <button class="nav-btn" id="nav-metar" onclick="switchPanel('metar')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
            </svg>
            METAR
        </button>
        <button class="nav-btn" id="nav-restrictions" onclick="switchPanel('restrictions')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            Restrictions
        </button>
    </nav>

    <script src="shared-weather.js"></script>
    <script>
        // ── Constants ────────────────────────────────────────────────────
        const KCPS_RUNWAY_12_HDG = 122
        const KCPS_RUNWAY_30_HDG = 302

    // ── Web Push configuration ────────────────────────────────────────
    // Fill these in after completing PUSH_SETUP.md.
    // VAPID_PUBLIC_KEY and Supabase values are safe to commit (they are
    // public-facing); only the private key / service-role key are secrets.
    const VAPID_PUBLIC_KEY  = 'BP7byIVBRDdsIzQ1umYq0fQ4p_XHblGM4J4ldOtp-G96XYInMQE0BtvloGzJKUVFFmkDVl6eCbnslDHB7mB4-68'
    const SUPABASE_URL      = 'https://hmcymrqnlsamrhrqmanz.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtY3ltcnFubHNhbXJocnFtYW56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzcyODIsImV4cCI6MjA4ODc1MzI4Mn0.jzZ9CQ6ZwrpbCm7Qa6cfZpYm5wWni5_LTnAFWfiK_jw'

        // ── Shared state ─────────────────────────────────────────────────
        let swReg            = null
        let noFlyingActive   = false
        let lastCategory     = 'a'
        let lastDetails      = 'Loading…'
        let lastStation      = 'KCPS'

        // ── Service worker registration ───────────────────────────────────
        async function registerSW() {
            if (!('serviceWorker' in navigator)) return
            try {
                swReg = await navigator.serviceWorker.register('mobile-sw.js')
                console.log('SW registered, scope:', swReg.scope)
            } catch (err) {
                console.warn('SW registration failed:', err)
            }
        }

        // ── Notification helpers ──────────────────────────────────────────
        // Converts the URL-safe base64 VAPID public key to the Uint8Array
        // format required by pushManager.subscribe()
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4)
            const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/')
            const rawData = atob(base64)
            return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)))
        }

        let toastTimer = null
        function showToast(message) {
            const el = document.getElementById('toast')
            if (!el) return
            el.textContent = message
            el.classList.add('show')
            clearTimeout(toastTimer)
            toastTimer = setTimeout(() => el.classList.remove('show'), 2600)
        }

        async function updateNotifyBtn() {
            const btn = document.getElementById('notifyBtn')
            if (!('Notification' in window)) { btn.style.display = 'none'; return }
            if (Notification.permission === 'denied') {
                btn.textContent = '🔕 Off'
                btn.className = 'notify-btn off'
                return
            }
            // When Web Push is configured, reflect actual push subscription state
            if (VAPID_PUBLIC_KEY && 'PushManager' in window) {
                const reg = swReg ?? await navigator.serviceWorker.getRegistration?.()
                const sub = await reg?.pushManager?.getSubscription?.()
                btn.textContent = sub ? '🔔 On' : '🔔 Notify'
                btn.className   = sub ? 'notify-btn on' : 'notify-btn'
                return
            }
            // Fallback: reflect OS notification permission only
            btn.textContent = Notification.permission === 'granted' ? '🔔 On' : '🔔 Notify'
            btn.className   = Notification.permission === 'granted' ? 'notify-btn on' : 'notify-btn'
        }

        async function handleNotifyBtn() {
            if (!('Notification' in window)) return
            if (Notification.permission === 'denied') return

            // ── Web Push path (VAPID configured + browser supports PushManager) ──
            if (VAPID_PUBLIC_KEY && 'PushManager' in window) {
                const reg      = swReg ?? await navigator.serviceWorker.ready
                const existing = await reg.pushManager.getSubscription()

                if (existing) {
                    // Tap again = unsubscribe
                    await existing.unsubscribe()
                    if (SUPABASE_URL) {
                        fetch(
                            `${SUPABASE_URL}/rest/v1/push_subscriptions?endpoint=eq.${encodeURIComponent(existing.endpoint)}`,
                            { method: 'DELETE', headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } },
                        ).catch(() => showToast('Unsubscribed on device only'))
                    }
                    showToast('Notifications turned off')
                    updateNotifyBtn()
                    return
                }

                if (Notification.permission !== 'granted') {
                    const result = await Notification.requestPermission()
                    updateNotifyBtn()
                    if (result !== 'granted') return
                }

                try {
                    const sub = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
                    })
                    if (SUPABASE_URL) {
                        const { endpoint, keys } = sub.toJSON()
                        const saveResp = await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                apikey: SUPABASE_ANON_KEY,
                                Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
                                Prefer: 'resolution=ignore-duplicates',
                            },
                            body: JSON.stringify({ endpoint, p256dh: keys.p256dh, auth: keys.auth }),
                        })
                        if (!saveResp.ok) {
                            console.warn('Subscription save failed:', saveResp.status)
                            showToast('Subscription save failed')
                        } else {
                            showToast('Notifications turned on')
                        }
                    } else {
                        showToast('Notifications turned on')
                    }
                    updateNotifyBtn()
                    sendNotification(lastCategory, lastDetails, lastStation)
                } catch (err) {
                    console.warn('Push subscription failed:', err)
                    showToast('Push subscription failed')
                    updateNotifyBtn()
                }
                return
            }

            // ── Local notification fallback (Web Push not configured) ─────────
            if (Notification.permission !== 'granted') {
                const result = await Notification.requestPermission()
                updateNotifyBtn()
                if (result !== 'granted') return
            }
            sendNotification(lastCategory, lastDetails, lastStation)
        }

        function sendNotification(category, details, station) {
            if (Notification.permission !== 'granted') return
            const msg = { type: 'NOTIFY', category, details, station }
            // Prefer the SW for a persistent notification; fall back to page-level
            const controller = swReg?.active ?? navigator.serviceWorker?.controller
            if (controller) {
                controller.postMessage(msg)
            } else {
                const icons = { a: '🟢', b: '🟡', c: '🟠', d: '🔴', f: '⛔' }
                new Notification(
                    `${icons[String(category).toLowerCase()] ?? '✈️'} Category ${String(category).toUpperCase()} — ${station}`,
                    { body: details, tag: 'kcps-flight-status', silent: true }
                )
            }
        }

        // ── Tab switching ─────────────────────────────────────────────────
        function switchPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
            document.getElementById(`panel-${name}`)?.classList.add('active')
            document.getElementById(`nav-${name}`)?.classList.add('active')
            // Scroll the main area back to top when switching panels
            document.querySelector('.main-scroll').scrollTop = 0
        }

        // ── Inline humidity (Magnus formula) ─────────────────────────────
        function calcHumidity(tC, tdC) {
            if (tC == null || tdC == null) return null
            const eS = 6.1078 * Math.pow(10, (7.5 * tC)  / (237.3 + tC))
            const eA = 6.1078 * Math.pow(10, (7.5 * tdC) / (237.3 + tdC))
            return Math.min(100, (eA / eS) * 100)
        }

        // ── Flight category calculation ───────────────────────────────────
        function calcCategory(d) {
            const tempF    = d.temperatureC != null ? d.temperatureC * 9 / 5 + 32 : null
            const humidity = calcHumidity(d.temperatureC, d.dewPointC)
            const hi       = (tempF != null && humidity != null)
                ? calculateHeatIndex(tempF, humidity)
                : (tempF ?? 70)

            const ew   = getEffectiveWindSpeed(d.windSpeed, d.windGust) ?? 0
            const cw12 = d.windDirection != null
                ? Math.abs(calculateCrosswind(d.windDirection, d.windSpeed, KCPS_RUNWAY_12_HDG, d.windGust))
                : 0
            const cw30 = d.windDirection != null
                ? Math.abs(calculateCrosswind(d.windDirection, d.windSpeed, KCPS_RUNWAY_30_HDG, d.windGust))
                : 0
            const maxCW = Math.max(cw12, cw30)

            let tempCat = 'a'
            if (tempF != null) {
                if      (tempF <= 14) tempCat = 'd'
                else if (tempF <= 23) tempCat = 'c'
            }
            if      (hi >= 105) tempCat = 'd'
            else if (hi >= 100 && tempCat !== 'd') tempCat = 'd'
            else if (hi >= 95  && tempCat === 'a') tempCat = 'c'

            let wxCat = 'a'
            if (ew >= 30 || maxCW > 20 || isCeilingRestricted(d.cloudCeiling) || isVisibilityRestricted(d.visibility)) wxCat = 'd'
            else if (ew >= 25 || maxCW > 15) wxCat = 'c'
            else if (ew >= 20 || maxCW > 10) wxCat = 'b'

            const order = ['a', 'b', 'c', 'd', 'f']
            return order[Math.max(order.indexOf(wxCat), order.indexOf(tempCat))]
        }

        // ── Render: category card ─────────────────────────────────────────
        function renderCategoryCard(category, details, station, usedFallback) {
            document.getElementById('catCard').className    = `flight-status-card cat-${category}`
            document.getElementById('catLetter').textContent = category.toUpperCase()
            document.getElementById('catDetails').textContent = details
            document.getElementById('catStation').innerHTML  =
                `${station}${usedFallback ? ' <span class="fallback-badge">Using KSTL</span>' : ''}`
        }

        // ── Render: temp / heat index note ────────────────────────────────
        function renderTempNote(d) {
            const el   = document.getElementById('tempNote')
            const tC   = d.temperatureC
            if (tC == null) { el.style.display = 'none'; return }

            const tempF   = tC * 9 / 5 + 32
            const humidity = calcHumidity(tC, d.dewPointC)
            const hi      = (humidity != null && tempF >= 80) ? calculateHeatIndex(tempF, humidity) : null

            const lines = []
            let level   = 'ok'

            if (hi != null) {
                if      (hi >= 105) { lines.push(`🌡️ Heat index ${hi.toFixed(0)}°F — all flights restricted`);         level = 'alert' }
                else if (hi >= 100) { lines.push(`🌡️ Heat index ${hi.toFixed(0)}°F — Diamond Dual/Piper restricted`);  level = 'alert' }
                else if (hi >= 95)  { lines.push(`🌡️ Heat index ${hi.toFixed(0)}°F — Diamond solo restricted`);        level = 'warn'  }
                else                 { lines.push(`🌡️ Heat index ${hi.toFixed(0)}°F — OK`) }
            }

            if      (tempF <= 5)  { lines.push(`❄️ ${tempF.toFixed(0)}°F — all flights restricted`);     if (level !== 'alert') level = 'alert' }
            else if (tempF <= 14) { lines.push(`❄️ ${tempF.toFixed(0)}°F — no solos or cross-countries`); if (level !== 'alert') level = 'alert' }
            else if (tempF <= 23) { lines.push(`❄️ ${tempF.toFixed(0)}°F — preheat required`);            if (level === 'ok')    level = 'warn'  }
            else                   { lines.push(`🌡️ ${tempF.toFixed(0)}°F (${tC.toFixed(1)}°C)`) }

            el.className    = `temp-note ${level}`
            el.textContent  = lines.join(' · ')
            el.style.display = 'block'
        }

        // ── Render: METAR + conditions panel ─────────────────────────────
        function renderMetarPanel(data, kcpsValid, kstlValid) {
            const kcps = data.kcps
            const kstl = data.kstl
            document.getElementById('metarKcps').textContent = kcpsValid ? (kcps.metar || '— no METAR —') : '— not available —'
            document.getElementById('metarKstl').textContent = kstlValid ? (kstl.metar || '— no METAR —') : '— not available —'

            const d        = kcpsValid ? kcps : kstl
            const tempF    = d.temperatureC != null ? d.temperatureC * 9 / 5 + 32 : null
            const humidity = calcHumidity(d.temperatureC, d.dewPointC)
            const hi       = (tempF != null && humidity != null && tempF >= 80) ? calculateHeatIndex(tempF, humidity) : tempF
            const ew       = getEffectiveWindSpeed(d.windSpeed, d.windGust)
            const cw12     = d.windDirection != null ? calculateCrosswind(d.windDirection, d.windSpeed, KCPS_RUNWAY_12_HDG, d.windGust) : null
            const cw30     = d.windDirection != null ? calculateCrosswind(d.windDirection, d.windSpeed, KCPS_RUNWAY_30_HDG, d.windGust) : null

            const windText = d.windSpeed != null
                ? `${d.windDirection ?? 'VRB'}° at ${d.windSpeed} kt${d.windGust ? ` G${d.windGust}` : ''}`
                : 'N/A'
            const ceilText = d.cloudCeiling != null
                ? (d.cloudCeiling >= 99999 ? 'Clear' : `${d.cloudCeiling.toLocaleString()} ft AGL`)
                : 'N/A'

            const cls = (val, warn, alert_) =>
                alert_ ? 'alert' : warn ? 'warn' : 'ok'

            document.getElementById('conditionsGrid').innerHTML = `
                <div class="cond-item">
                    <div class="cond-label">Temperature</div>
                    <div class="cond-value">${tempF != null ? tempF.toFixed(0) + '°F' : 'N/A'}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">Heat Index</div>
                    <div class="cond-value ${cls(hi, (hi??70)>=95, (hi??70)>=105)}">${hi != null ? hi.toFixed(0) + '°F' : 'N/A'}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">Humidity</div>
                    <div class="cond-value">${humidity != null ? humidity.toFixed(0) + '%' : 'N/A'}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">Visibility</div>
                    <div class="cond-value ${isVisibilityRestricted(d.visibility) ? 'alert' : 'ok'}">${d.visibility != null ? d.visibility + ' SM' : 'N/A'}</div>
                </div>
                <div class="cond-item" style="grid-column:1/-1;">
                    <div class="cond-label">Surface Winds</div>
                    <div class="cond-value ${cls(ew, (ew??0)>15, (ew??0)>25)}">${windText}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">Ceiling</div>
                    <div class="cond-value ${isCeilingRestricted(d.cloudCeiling) ? 'alert' : 'ok'}">${ceilText}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">Altimeter</div>
                    <div class="cond-value">${d.altimeter != null ? (parseInt(String(d.altimeter).replace(/\D/g, '')) / 100).toFixed(2) + ' inHg' : 'N/A'}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">CW RWY 12</div>
                    <div class="cond-value ${cw12 != null && Math.abs(cw12) > 10 ? 'warn' : 'ok'}">${cw12 != null ? Math.abs(cw12).toFixed(1) + ' kt' : 'N/A'}</div>
                </div>
                <div class="cond-item">
                    <div class="cond-label">CW RWY 30</div>
                    <div class="cond-value ${cw30 != null && Math.abs(cw30) > 10 ? 'warn' : 'ok'}">${cw30 != null ? Math.abs(cw30).toFixed(1) + ' kt' : 'N/A'}</div>
                </div>
            `
        }

        // ── Render: restrictions panel ────────────────────────────────────
        function renderRestrictionsPanel(d) {
            const ew   = getEffectiveWindSpeed(d.windSpeed, d.windGust) ?? 0
            const cw12 = d.windDirection != null ? Math.abs(calculateCrosswind(d.windDirection, d.windSpeed, KCPS_RUNWAY_12_HDG, d.windGust)) : 0
            const cw30 = d.windDirection != null ? Math.abs(calculateCrosswind(d.windDirection, d.windSpeed, KCPS_RUNWAY_30_HDG, d.windGust)) : 0
            const maxCW = Math.max(cw12, cw30)
            const ceil  = isCeilingRestricted(d.cloudCeiling)
            const vis   = isVisibilityRestricted(d.visibility)

            const tempF    = d.temperatureC != null ? d.temperatureC * 9 / 5 + 32 : null
            const humidity = calcHumidity(d.temperatureC, d.dewPointC)
            const hi       = (tempF != null && humidity != null && tempF >= 80) ? calculateHeatIndex(tempF, humidity) : (tempF ?? 70)

            const row = (label, restricted) => `
                <div class="restriction-row">
                    <span class="rlabel">${label}</span>
                    <span class="status-pill ${restricted ? 'restricted' : 'ok'}">${restricted ? 'RESTRICTED' : 'OK'}</span>
                </div>`

            document.getElementById('panel-restrictions').innerHTML = `
                <div class="restriction-group">
                    <div class="restriction-group-header">Student Pilot Solo</div>
                    ${row('Ceiling &lt; 1,500 ft AGL', ceil)}
                    ${row('Visibility &lt; 3 SM', vis)}
                    ${row('Surface winds &ge; 20 kt', ew >= 20)}
                    ${row(`Crosswind &gt; 10 kt (${maxCW.toFixed(1)} kt max)`, maxCW > 10)}
                </div>
                <div class="restriction-group">
                    <div class="restriction-group-header">Private Pilot Solo</div>
                    ${row('Ceiling &lt; 1,500 ft AGL', ceil)}
                    ${row('Visibility &lt; 3 SM', vis)}
                    ${row('Surface winds &ge; 25 kt', ew >= 25)}
                    ${row(`Crosswind &gt; 15 kt (${maxCW.toFixed(1)} kt max)`, maxCW > 15)}
                </div>
                <div class="restriction-group">
                    <div class="restriction-group-header">Instrument / Commercial Solo</div>
                    ${row('Ceiling &lt; 1,500 ft AGL', ceil)}
                    ${row('Visibility &lt; 3 SM', vis)}
                    ${row('Surface winds &ge; 30 kt', ew >= 30)}
                    ${row(`Crosswind &gt; 20 kt (${maxCW.toFixed(1)} kt max)`, maxCW > 20)}
                </div>
                <div class="restriction-group">
                    <div class="restriction-group-header">Heat Index &amp; Temperature</div>
                    ${row('Heat index ≥ 105°F — all flights restricted', hi >= 105)}
                    ${row('Heat index ≥ 100°F — Diamond Dual/Piper solo restricted', hi >= 100)}
                    ${row('Heat index ≥ 95°F — Diamond solo restricted', hi >= 95)}
                    ${row('Temperature ≤ 23°F — preheat required', tempF != null && tempF <= 23)}
                    ${row('Temperature ≤ 14°F — no solos or cross-countries', tempF != null && tempF <= 14)}
                    ${row('Temperature ≤ 5°F — all flights restricted', tempF != null && tempF <= 5)}
                </div>
            `
        }

        // ── Main weather fetch & render ───────────────────────────────────
        async function updateWeather() {
            try {
                const data = await fetchWeatherDataFromJSON()
                if (!data?.kcps || !data?.kstl) return

                const kcpsValid = data.kcps.windSpeed != null
                const d         = kcpsValid ? data.kcps : data.kstl
                const station   = kcpsValid ? 'KCPS' : 'KSTL'

                const category = noFlyingActive ? 'f' : calcCategory(d)
                const catLabels = {
                    a: 'No solo restrictions in effect.',
                    b: 'Student pilot solos restricted.',
                    c: 'Private pilot solos restricted.',
                    d: 'Instrument/Commercial solos restricted.',
                    f: 'No flights. See airport announcements for details.'
                }
                const details = catLabels[category]

                lastCategory = category
                lastDetails  = details
                lastStation  = station

                renderCategoryCard(category, details, station, !kcpsValid)
                renderTempNote(d)
                renderMetarPanel(data, kcpsValid, data.kstl.windSpeed != null)
                renderRestrictionsPanel(d)

                const updated = data.lastUpdated
                    ? new Date(data.lastUpdated).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : '—'
                document.getElementById('updateTime').textContent = `Updated ${updated}`

                // Refresh the persistent notification silently on every data pull
                sendNotification(category, details, station)

            } catch (err) {
                console.error('Weather update error:', err)
                document.getElementById('updateTime').textContent = 'Update failed'
            }
        }

        // ── Announcements fetch ───────────────────────────────────────────
        async function fetchAnnouncements() {
            try {
                const res = await fetch(
                    'https://api.github.com/repos/CenterForDigitalHumanities/aviation-dashboard/discussions',
                    { headers: { Accept: 'application/vnd.github.v3+json' } }
                )
                if (!res.ok) { showDefaultAnnouncement(); return }

                const discussions = await res.json()
                const announcements = discussions
                    .filter(d => d.category?.name === 'Announcements' && d.state === 'open')
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 10)
                    .map(d => ({ title: d.title, content: d.body || '', date: d.created_at }))

                if (announcements.length === 0) { showDefaultAnnouncement(); return }
                displayAnnouncements(announcements)

            } catch {
                showDefaultAnnouncement()
            }
        }

        function displayAnnouncements(announcements) {
            const hasNoFlying = announcements.some(a =>
                a.title?.toLowerCase().includes('#noflying') ||
                a.content?.toLowerCase().includes('#noflying')
            )
            noFlyingActive = hasNoFlying
            document.getElementById('closedBanner').classList.toggle('active', hasNoFlying)

            if (hasNoFlying) {
                const details = 'No flights. See airport announcements for details.'
                renderCategoryCard('f', details, lastStation, false)
                sendNotification('f', details, lastStation)
            }

            document.getElementById('announcementsContent').innerHTML = announcements.map(a => {
                const date    = new Date(a.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                const content = a.content.replace(/<[^>]*>/g, '').substring(0, 280)
                return `<div class="announcement-item">
                    <div class="announcement-date">${date}</div>
                    <div class="announcement-title">${a.title}</div>
                    <div class="announcement-content">${content}</div>
                </div>`
            }).join('')
        }

        function showDefaultAnnouncement() {
            document.getElementById('announcementsContent').innerHTML = `
                <div class="announcement-item">
                    <div class="announcement-date">—</div>
                    <div class="announcement-title">No announcements</div>
                    <div class="announcement-content">Flight status is determined by current weather conditions.</div>
                </div>`
        }

        // ── Startup ───────────────────────────────────────────────────────
        registerSW()
        updateNotifyBtn()
        updateWeather()
        fetchAnnouncements()

        // Refresh weather every 5 minutes; announcements every 10 minutes
        setInterval(updateWeather, 5 * 60 * 1000)
        setInterval(fetchAnnouncements, 10 * 60 * 1000)
    </script>
</body>
</html>
