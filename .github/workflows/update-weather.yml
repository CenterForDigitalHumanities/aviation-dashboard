name: Update Weather Data

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from Actions tab
  push:
    branches:
      - gh-actions-timer
      - main
    paths:
      - '.github/workflows/update-weather.yml'
      - 'scripts/fetch-weather.py'

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required to commit and push changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          ref: main
          fetch-depth: 1
          
      - name: Checkout weather-data branch
        run: |
          git fetch origin weather-data --depth=1 2>/dev/null || echo "weather-data branch does not exist yet"
          
      - name: Setup Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.x'
          
      - name: Fetch weather data
        run: |
          cd scripts
          python fetch-weather.py
          
      - name: Safely verify weather data file
        run: |
          if [ -f data/weather-data.json ]; then
            echo "weather-data.json exists in data directory"
          else
            echo "data/weather-data.json not found. The fetch script should write here."
            exit 0
          fi
          
      - name: Check if data changed
        id: check-changes
        run: |
          # Get checksum of current fetched data
          NEW_CHECKSUM=$(sha256sum data/weather-data.json | cut -d' ' -f1)
          echo "New checksum: $NEW_CHECKSUM"
          
          # Try to get previous checksum from weather-data branch
          git show origin/weather-data:data/weather-data.json > /tmp/old-weather.json 2>/dev/null && \
          OLD_CHECKSUM=$(sha256sum /tmp/old-weather.json | cut -d' ' -f1) || \
          OLD_CHECKSUM="none"
          
          echo "Old checksum: $OLD_CHECKSUM"
          
          if [ "$NEW_CHECKSUM" = "$OLD_CHECKSUM" ]; then
            echo "data-changed=false" >> $GITHUB_OUTPUT
            echo "Data unchanged, skipping commit"
          else
            echo "data-changed=true" >> $GITHUB_OUTPUT
            echo "Data changed, will commit to weather-data branch"
          fi
          
      - name: Commit and push to weather-data branch
        if: steps.check-changes.outputs.data-changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Create or switch to weather-data branch
          git fetch origin weather-data 2>/dev/null || git checkout -b weather-data
          git checkout weather-data 2>/dev/null || git checkout -b weather-data
          
          # Copy the fetched data to weather-data branch
          mkdir -p data
          cp /path/to/fetched/data/weather-data.json data/weather-data.json 2>/dev/null || true
          
          # The fetch script should have created data/weather-data.json already
          if [ -f data/weather-data.json ]; then
            git add data/weather-data.json
            git commit -m "🌤️ Update weather data - $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "Nothing to commit"
            git push origin weather-data
          fi
