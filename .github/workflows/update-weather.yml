name: Update Weather Data

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from Actions tab
  push:
    branches:
      - gh-actions-timer
      - main
    paths:
      - '.github/workflows/update-weather.yml'
      - 'scripts/fetch-weather.py'

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required to commit and push changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          ref: main
          fetch-depth: 1
          
      - name: Checkout weather-data branch
        run: |
          git fetch origin weather-data --depth=1 2>/dev/null || echo "weather-data branch does not exist yet"
          
      - name: Setup Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.x'
          
      - name: Fetch weather data
        run: |
          cd scripts
          python fetch-weather.py
          
      - name: Safely verify weather data file
        run: |
          if [ -f data/weather-data.json ]; then
            echo "weather-data.json exists in data directory"
          else
            echo "data/weather-data.json not found. The fetch script should write here."
            exit 0
          fi
          
      - name: Check if data changed
        id: check-changes
        run: |
          # Get checksum of current fetched data
          NEW_CHECKSUM=$(sha256sum data/weather-data.json | cut -d' ' -f1)
          echo "New checksum: $NEW_CHECKSUM"
          
          # Try to get previous checksum from weather-data branch
          git show origin/weather-data:data/weather-data.json > /tmp/old-weather.json 2>/dev/null && \
          OLD_CHECKSUM=$(sha256sum /tmp/old-weather.json | cut -d' ' -f1) || \
          OLD_CHECKSUM="none"
          
          echo "Old checksum: $OLD_CHECKSUM"
          
          if [ "$NEW_CHECKSUM" = "$OLD_CHECKSUM" ]; then
            echo "data-changed=false" >> $GITHUB_OUTPUT
            echo "Data unchanged, skipping commit"
          else
            echo "data-changed=true" >> $GITHUB_OUTPUT
            echo "Data changed, will commit to weather-data branch"
          fi
          
      - name: Install Web Push dependencies
        if: steps.check-changes.outputs.data-changed == 'true'
        run: npm install --no-save web-push

      - name: Send Web Push notifications
        if: steps.check-changes.outputs.data-changed == 'true'
        run: node scripts/send-push.mjs
        env:
          VAPID_PUBLIC_KEY:          ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:         ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:             ${{ secrets.VAPID_SUBJECT }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit and push to weather-data branch
        if: steps.check-changes.outputs.data-changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Save the newly fetched data before switching branches
          cp data/weather-data.json /tmp/weather-data-new.json

          # Force checkout to weather-data branch, discarding the working tree change
          # (safe because we already saved the new data to /tmp above)
          git fetch origin weather-data
          git checkout -f -B weather-data origin/weather-data

          # Apply new data and commit
          mkdir -p data
          cp /tmp/weather-data-new.json data/weather-data.json
          git add data/weather-data.json
          git commit -m "🌤️ Update weather data - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin weather-data

      # Update the public Gist so the frontend can fetch weather data without CORS issues.
      # The Gist raw URL (https://gist.githubusercontent.com/cubap/8559048ba1cac126b5eb03e56309e73f/raw/weather-data.json)
      # serves files with permissive CORS headers, unlike raw.githubusercontent.com.
      # WEATHER_PAT must be a GitHub Personal Access Token with the "gist" scope.
      - name: Update Gist with latest weather data
        if: steps.check-changes.outputs.data-changed == 'true'
        env:
          WEATHER_PAT: ${{ secrets.WEATHER_PAT }}
        run: |
          # Use Python to safely encode the JSON file for the PATCH API payload.
          # This avoids shell-quoting issues and ensures valid JSON encoding.
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.error

          gist_id = "8559048ba1cac126b5eb03e56309e73f"
          pat = os.environ["WEATHER_PAT"]

          with open("data/weather-data.json", "r") as f:
              content = f.read()

          payload = json.dumps({
              "files": {
                  "weather-data.json": {
                      "content": content
                  }
              }
          }).encode("utf-8")

          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"Bearer {pat}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "aviation-dashboard-actions",
              },
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Gist updated successfully (HTTP {resp.status})")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Failed to update Gist: HTTP {e.code} - {body}")
              raise SystemExit(1)
          EOF
